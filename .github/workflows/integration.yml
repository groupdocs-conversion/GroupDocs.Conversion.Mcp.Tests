name: integration

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Nightly — catches regressions introduced by nuget.org / dnx / runtime changes.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      package_version:
        description: "GroupDocs.Conversion.Mcp version on nuget.org to test"
        required: false
        default: "26.5.0"
  # Triggered from the main repo's publish workflow right after a NuGet push.
  # Payload: { "package_version": "x.y.z" }
  repository_dispatch:
    types: [nuget-published]

jobs:
  test:
    name: ${{ matrix.os }} · dnx
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      MCP_PACKAGE_VERSION: >-
        ${{ github.event.inputs.package_version
            || github.event.client_payload.package_version
            || '26.5.0' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Show environment
        shell: bash
        run: |
          dotnet --info
          echo "Testing GroupDocs.Conversion.Mcp@${MCP_PACKAGE_VERSION}"
          dnx --help || true

      - name: Write GroupDocs license (optional)
        # If the repo defines a GROUPDOCS_LICENSE secret (base64 of a .lic file),
        # write it to disk and point GROUPDOCS_LICENSE_PATH at it. With a license
        # in place, Convert output drops the watermark; integration tests still
        # exercise the same paths.
        env:
          GROUPDOCS_LICENSE: ${{ secrets.GROUPDOCS_LICENSE }}
        if: env.GROUPDOCS_LICENSE != ''
        shell: bash
        run: |
          echo "$GROUPDOCS_LICENSE" | base64 -d > "$RUNNER_TEMP/GroupDocs.lic"
          echo "GROUPDOCS_LICENSE_PATH=$RUNNER_TEMP/GroupDocs.lic" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Integration tests
        run: >-
          dotnet test --configuration Release --no-build
          --logger "trx;LogFileName=integration.trx"
          --logger "console;verbosity=detailed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-${{ matrix.os }}
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
